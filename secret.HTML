<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Retro Terminal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:"Courier New",monospace;
    color:#00ff66;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
    repeating-linear-gradient(
        transparent 0px,
        rgba(255,255,255,.02) 2px,
        transparent 4px
    );
    opacity:.35;
}

body::after{
    content:"";
    position:fixed;
    inset:0;
    background:radial-gradient(circle,#0000 55%,rgba(0,0,0,.45));
    pointer-events:none;
}

#terminal{
    padding:20px;
    white-space:pre-wrap;
    line-height:1.4;
    text-shadow:
        0 0 5px #00ff66,
        0 0 12px #00ff66;
    animation:flicker .12s infinite alternate;
}

.cursor{
    display:inline-block;
    width:10px;
    height:18px;
    background:#00ff66;
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

@keyframes flicker{
    from{opacity:.96;}
    to{opacity:1;}
}

.scanline{
    position:fixed;
    top:-100%;
    left:0;
    width:100%;
    height:100%;
    background:linear-gradient(
        transparent,
        rgba(0,255,120,.08),
        transparent
    );
    animation:scan 7s linear infinite;
    pointer-events:none;
}

@keyframes scan{
    to{
        transform:translateY(200%);
    }
}
</style>
</head>

<body>

<div id="terminal"></div>
<div class="scanline"></div>

<script>

const log=[
"[BOOT] SYSTEM INITIALIZED",
"[OK] MEMORY CHECK PASSED",
"[OK] NETWORK ONLINE",
"[INFO] ESTABLISHING LINK...",
"[INFO] AUTHENTICATION ACCEPTED",
"[SYS] LOADING MODULES",
"[OK] MODULE graphics",
"[OK] MODULE crypto",
"[OK] MODULE kernel",
"[LOG] OPEN SESSION",
"[DATA] BUFFER READY",
"[TRACE] PORT 22 OPEN",
"[TRACE] PORT 443 OPEN",
"[INFO] ROUTING PACKETS",
"[INFO] DECRYPTING STREAM",
"[OK] CACHE SYNCHRONIZED",
"[SYS] WAITING..."
];

const terminal=document.getElementById("terminal");

let line=0;

function addLine(){

    if(line<log.length){

        terminal.innerHTML+=log[line++]+"\n";

    }else{

        const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        let txt="[";
        for(let i=0;i<8;i++)
            txt+=chars[Math.floor(Math.random()*chars.length)];
        txt+="] ";

        for(let i=0;i<28;i++)
            txt+=chars[Math.floor(Math.random()*chars.length)];

        terminal.innerHTML+=txt+"\n";
    }

    terminal.innerHTML=terminal.innerHTML.replace(/<span class="cursor"><\/span>/g,"");
    terminal.innerHTML+='<span class="cursor"></span>';

    window.scrollTo(0,document.body.scrollHeight);

}

setInterval(addLine,120);

</script>

</body>
</html>
