<svg width="900" height="520" viewBox="0 0 900 520"
     xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="900" height="520" fill="#0d1117"/>

  <!-- Terminal -->
  <rect x="180" y="80" width="540" height="230"
        rx="15"
        fill="#161b22"
        stroke="#30363d"
        stroke-width="3"/>

  <!-- Terminal dots -->
  <circle cx="215" cy="110" r="10" fill="#ff5f56"/>
  <circle cx="250" cy="110" r="10" fill="#ffbd2e"/>
  <circle cx="285" cy="110" r="10" fill="#27c93f"/>

  <text x="220" y="175"
        font-family="monospace"
        font-size="22"
        fill="#58a6ff">
    $ git push origin main --force
  </text>

  <text x="220" y="215"
        font-family="monospace"
        font-size="18"
        fill="#ff7b72">
    remote: history deleted
  </text>

  <text x="220" y="250"
        font-family="monospace"
        font-size="18"
        fill="#f85149">
    ERROR: teammate screaming
  </text>


  <!-- Developer -->
  <circle cx="450" cy="400" r="45"
          fill="#f2cc8f"/>

  <!-- Hair -->
  <path d="
    M410 385
    Q450 335 490 385
    L480 360
    Q450 330 420 360 Z"
    fill="#24292f"/>

  <!-- Hoodie -->
  <path d="
    M390 445
    Q450 400 510 445
    L540 520
    L360 520 Z"
    fill="#30363d"/>


  <!-- Angry teammates -->
  <g font-family="monospace"
     font-size="32"
     fill="#ff7b72">

    <text x="70" y="390">
      😡
    </text>

    <text x="760" y="390">
      😡
    </text>

  </g>


  <!-- Speech bubbles -->

  <rect x="40" y="300"
        width="230"
        height="70"
        rx="15"
        fill="#21262d"/>

  <text x="60" y="335"
        font-family="monospace"
        font-size="18"
        fill="white">
    WHO FORCE PUSHED?
  </text>


  <rect x="650" y="300"
        width="220"
        height="70"
        rx="15"
        fill="#21262d"/>

  <text x="670" y="335"
        font-family="monospace"
        font-size="18"
        fill="white">
    MY BRANCH!!!
  </text>


  <!-- Title -->
  <text x="450" y="55"
        text-anchor="middle"
        font-family="monospace"
        font-size="30"
        fill="#ffffff">
    TEAM DEV INCIDENT
  </text>

</svg>
