<svg width="1536" height="512" viewBox="0 0 1536 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#050816"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>

    <linearGradient id="avatar" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .tech {
        font-family: Arial, sans-serif;
        font-weight: bold;
        fill: white;
        text-anchor: middle;
      }

      .orbit {
        fill: none;
        stroke: #334155;
        stroke-width: 2;
        stroke-dasharray: 8 12;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1536" height="512" fill="url(#bg)"/>

  <!-- Decorative stars -->
  <circle cx="120" cy="90" r="2" fill="#38BDF8"/>
  <circle cx="1400" cy="110" r="3" fill="#8B5CF6"/>
  <circle cx="1320" cy="400" r="2" fill="#22D3EE"/>

  <!-- Orbit -->
  <ellipse cx="768" cy="256" rx="260" ry="130" class="orbit"/>
  <ellipse cx="768" cy="256" rx="340" ry="180" class="orbit"/>

  <!-- Avatar -->
  <circle cx="768" cy="256" r="95" fill="url(#avatar)" filter="url(#glow)"/>
  <circle cx="768" cy="256" r="82" fill="#0F172A"/>

  <text x="768" y="275"
        font-size="70"
        font-family="Arial"
        font-weight="bold"
        fill="white"
        text-anchor="middle">
    QY
  </text>

  <!-- Name -->
  <text x="768" y="430"
        font-size="32"
        font-family="Arial"
        fill="#CBD5E1"
        text-anchor="middle">
    Qianyu Yang
  </text>


  <!-- Tech Nodes -->
  <g class="tech" font-size="22">

    <g transform="translate(768 75)">
      <circle r="45" fill="#E34F26"/>
      <text y="8">HTML</text>
    </g>

    <g transform="translate(1060 150)">
      <circle r="45" fill="#1572B6"/>
      <text y="8">CSS</text>
    </g>

    <g transform="translate(1100 350)">
      <circle r="45" fill="#F7DF1E"/>
      <text y="8" fill="black">JS</text>
    </g>

    <g transform="translate(768 430)">
      <circle r="45" fill="#61DAFB"/>
      <text y="8" fill="black">React</text>
    </g>

    <g transform="translate(440 350)">
      <circle r="45" fill="#339933"/>
      <text y="8">Node</text>
    </g>

    <g transform="translate(470 150)">
      <circle r="45" fill="#336791"/>
      <text y="8">SQL</text>
    </g>

  </g>

  <!-- Header title -->
  <text x="80" y="120"
        font-size="48"
        font-family="Arial"
        font-weight="bold"
        fill="white">
    Developer Portfolio
  </text>

  <text x="80" y="165"
        font-size="22"
        font-family="Arial"
        fill="#94A3B8">
    Web • API • Full Stack Development
  </text>

</svg>
