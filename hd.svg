<svg width="1536" height="512" viewBox="0 0 1536 512"
     fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- 背景 -->
    <linearGradient id="space" x1="0" y1="0" x2="1536" y2="512"
                    gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.5" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>

    <!-- 中心の光 -->
    <radialGradient id="core">
      <stop stop-color="#ffffff"/>
      <stop offset="0.2" stop-color="#a5b4fc"/>
      <stop offset="0.55" stop-color="#6366f1" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>

    <!-- 軌道の光 -->
    <linearGradient id="orbit" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#818cf8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#a5b4fc" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>

    <!-- カード -->
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <filter id="smallGlow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>

    <!-- アイコンカード -->
    <g id="html">
      <rect x="-62" y="-25" width="124" height="50" rx="12"
            fill="url(#card)" stroke="#f97316" stroke-width="2"/>
      <text x="0" y="7"
            text-anchor="middle"
            font-family="Arial, sans-serif"
            font-size="18"
            font-weight="bold"
            fill="#fb923c">
        HTML
      </text>
    </g>

    <g id="css">
      <rect x="-62" y="-25" width="124" height="50" rx="12"
            fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
      <text x="0" y="7"
            text-anchor="middle"
            font-family="Arial, sans-serif"
            font-size="18"
            font-weight="bold"
            fill="#38bdf8">
        CSS
      </text>
    </g>

    <g id="javascript">
      <rect x="-78" y="-25" width="156" height="50" rx="12"
            fill="url(#card)" stroke="#facc15" stroke-width="2"/>
      <text x="0" y="7"
            text-anchor="middle"
            font-family="Arial, sans-serif"
            font-size="18"
            font-weight="bold"
            fill="#facc15">
        JavaScript
      </text>
    </g>

    <g id="node">
      <rect x="-78" y="-25" width="156" height="50" rx="12"
            fill="url(#card)" stroke="#4ade80" stroke-width="2"/>
      <text x="0" y="7"
            text-anchor="middle"
            font-family="Arial, sans-serif"
            font-size="18"
            font-weight="bold"
            fill="#4ade80">
        Node.js
      </text>
    </g>

    <g id="tailwind">
      <rect x="-92" y="-25" width="184" height="50" rx="12"
            fill="url(#card)" stroke="#22d3ee" stroke-width="2"/>
      <text x="0" y="7"
            text-anchor="middle"
            font-family="Arial, sans-serif"
            font-size="18"
            font-weight="bold"
            fill="#22d3ee">
        Tailwind CSS
      </text>
    </g>

    <g id="python">
      <rect x="-68" y="-25" width="136" height="50" rx="12"
            fill="url(#card)" stroke="#60a5fa" stroke-width="2"/>
      <text x="0" y="7"
            text-anchor="middle"
            font-family="Arial, sans-serif"
            font-size="18"
            font-weight="bold"
            fill="#60a5fa">
        Python
      </text>
    </g>
  </defs>

  <!-- 背景 -->
  <rect width="1536" height="512" fill="url(#space)"/>

  <!-- 星 -->
  <g fill="#ffffff">
    <circle cx="80" cy="80" r="1.5"/>
    <circle cx="180" cy="410" r="1"/>
    <circle cx="320" cy="90" r="1.5"/>
    <circle cx="470" cy="430" r="1"/>
    <circle cx="650" cy="60" r="1.5"/>
    <circle cx="820" cy="440" r="1"/>
    <circle cx="980" cy="80" r="1.5"/>
    <circle cx="1170" cy="420" r="1"/>
    <circle cx="1340" cy="100" r="1.5"/>
    <circle cx="1460" cy="350" r="1"/>
  </g>

  <!-- 星の点滅 -->
  <g fill="#a5b4fc">
    <circle cx="250" cy="260" r="2">
      <animate attributeName="opacity"
               values="0.2;1;0.2"
               dur="2.5s"
               repeatCount="indefinite"/>
    </circle>

    <circle cx="1260" cy="180" r="2">
      <animate attributeName="opacity"
               values="1;0.2;1"
               dur="3s"
               repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 軌道の発光 -->
  <ellipse cx="768" cy="256"
           rx="470" ry="145"
           stroke="#6366f1"
           stroke-width="14"
           opacity="0.12"
           filter="url(#glow)"/>

  <!-- 軌道 -->
  <ellipse cx="768" cy="256"
           rx="470" ry="145"
           stroke="url(#orbit)"
           stroke-width="2"
           stroke-dasharray="8 12"
           opacity="0.8"/>

  <!-- 逆方向の軌道 -->
  <ellipse cx="768" cy="256"
           rx="330" ry="95"
           transform="rotate(-18 768 256)"
           stroke="#818cf8"
           stroke-width="1"
           stroke-dasharray="4 16"
           opacity="0.35"/>

  <!-- 中心の光 -->
  <circle cx="768" cy="256" r="120"
          fill="url(#core)"
          opacity="0.35"
          filter="url(#glow)"/>

  <!-- 中心ロゴ -->
  <circle cx="768" cy="256" r="82"
          fill="#020617"
          stroke="#818cf8"
          stroke-width="2"/>

  <circle cx="768" cy="256" r="70"
          stroke="#6366f1"
          stroke-width="1"
          stroke-dasharray="3 8"
          opacity="0.7">

    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 768 256"
      to="360 768 256"
      dur="20s"
      repeatCount="indefinite"/>
  </circle>

  <text x="768" y="267"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="34"
        font-weight="bold"
        fill="white">
    qianyu
  </text>

  <!-- 公転する技術カード -->
  <g>
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 768 256"
      to="360 768 256"
      dur="18s"
      repeatCount="indefinite"/>

    <g transform="translate(1238 256)">
      <use href="#html"/>
    </g>

    <g transform="translate(1003 126)">
      <use href="#css"/>
    </g>

    <g transform="translate(690 120)">
      <use href="#javascript"/>
    </g>

    <g transform="translate(390 230)">
      <use href="#node"/>
    </g>

    <g transform="translate(600 390)">
      <use href="#tailwind"/>
    </g>

    <g transform="translate(1000 390)">
      <use href="#python"/>
    </g>
  </g>

  <!-- 上部タイトル -->
  <text x="768" y="55"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="16"
        letter-spacing="6"
        fill="#94a3b8">
    FULL STACK DEVELOPER
  </text>

  <!-- 下部 -->
  <text x="768" y="480"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="13"
        letter-spacing="3"
        fill="#64748b">
    BUILD • CREATE • EXPLORE
  </text>

</svg>
